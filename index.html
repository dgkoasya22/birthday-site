<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Music</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Happy Birthday!</h1>
    <audio id="audioPlayer" src="birthday-song.mp3" preload="auto"></audio>
    <div id="lyricsScreen" class="hidden">
        <h2>Lyrics</h2>
        <div id="lyricDisplay"></div>
    </div>
    <button id="toggleMusic">Play Music</button>

    <script>
        const lyricsData = [
            { time: 0, text: "Happy birthday to you," },
            { time: 5, text: "Happy birthday to you," },
            { time: 10, text: "Happy birthday dear [Name]," },
            { time: 15, text: "Happy birthday to you!" }
        ];

        let audioPlayer = document.getElementById('audioPlayer');
        let toggleMusicButton = document.getElementById('toggleMusic');
        let lyricsScreen = document.getElementById('lyricsScreen');
        let lyricDisplay = document.getElementById('lyricDisplay');
        let currentLyricIndex = 0;

        toggleMusicButton.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                lyricsScreen.classList.remove('hidden');
                syncLyrics();
                toggleMusicButton.innerText = "Pause Music";
            } else {
                audioPlayer.pause();
                toggleMusicButton.innerText = "Play Music";
            }
        });

        function syncLyrics() {
            setInterval(() => {
                let currentTime = audioPlayer.currentTime;
                if (currentLyricIndex < lyricsData.length && currentTime >= lyricsData[currentLyricIndex].time) {
                    lyricDisplay.innerText = lyricsData[currentLyricIndex].text;
                    currentLyricIndex++;
                }
            }, 500);
        }
    </script>
</body>
</html>
