<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Sayfa</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* 🎬 intro */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

#logo{
  font-size:30px;
  color:#e50914;
  animation:intro 3.5s ease forwards;
  padding:0 20px;
}

@keyframes intro{
  0%{opacity:0;transform:scale(0.7)}
  50%{opacity:1;transform:scale(1.1)}
  100%{opacity:0}
}

/* 🔐 lock */
#lock{
  display:none;
  flex-direction:column;
}

input{
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* 📜 içerik */
#content{
  display:none;
  max-width:600px;
  padding:20px;
}

</style>
</head>

<body>

<div id="intro">
  <div id="logo">Doğum günün kutlu olsun Çatlak fıstık</div>
</div>

<div id="lock">
  <h2>Bu sayfa özel 🔐</h2>
  <p style="font-size:12px;opacity:0.7">İpucu: 6 haneli özel tarih</p>
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="check()">Giriş</button>
</div>

<div id="content">
  <h1>İyi ki doğdun 🎂</h1>
  <p id="text"></p>
</div>

<script>

// 🎬 MESAJ
const message = `İyi ki doğdun 🤍

Asya...

Bazen bazı insanlar hayatımıza çok uzun süreler boyunca değil,
çok kısa anlarda girer ama etkisi uzun süre kalır.

Sen de benim için öyle bir iz bıraktın.

Kısa bir zaman içinde yaşanan şeyler,
bazen uzun bir zamana bedel olur.

Gülüşlerin, konuşmaların ve bıraktığın o his...
kolay kolay silinmiyor.

Ne olursa olsun,
bu hikâyenin bir yerinde sen hep özel kalacaksın.

İyi ki doğdun.`;

// ✍️ yazı efekti (yavaş + düzgün satır)
let i = 0;
function type(){
  if(i < message.length){
    let c = message[i];

    if(c === "\n"){
      document.getElementById("text").innerHTML += "<br>";
    } else {
      document.getElementById("text").innerHTML += c;
    }

    i++;
    setTimeout(type, 70);
  }
}

// 🚀 sayfa başlangıç
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lock").style.display="flex";
  },3500);
};

// 🔐 giriş kontrol
function check(){
  if(document.getElementById("pass").value === "290704"){

    logUser(); // 🔥 Firebase log

    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";

    type();
  } else {
    alert("Yanlış şifre ❌");
  }
}

// 🔥 FIREBASE LOG (BOZULMAYAN)
const DB_URL = "https://dogum-d1b8a-default-rtdb.europe-west1.firebasedatabase.app/logs.json";

function logUser(){
  try{
    fetch(DB_URL,{
      method:"POST",
      body:JSON.stringify({
        time:new Date().toLocaleString(),
        device:navigator.userAgent
      })
    });
  }catch(e){
    console.log("Firebase hata:", e);
  }
}

</script>

</body>
</html>
